name: Python application hello-victor:1.0.0

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test with pytest
      run: pytest

    - name: Ejecutar la aplicación
      run: python app.py

    - name: Simular deploy
      run: echo "Desplegando la aplicación..."

    - name: Construir imagen Docker
      run: docker build -t ghcr.io/victor1997h/hello-victor:1.0.0 .

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar imagen Docker
      run: docker push ghcr.io/victor1997h/hello-victor:1.0.0